<template>
    <lightning-modal-header label={labels.modalTitle}></lightning-modal-header>

    <lightning-modal-body>
        <div class="progress-wrap">
            <div class="pcw-progress" role="list">
                <template for:each={progressSteps} for:item="s">
                    <div
                        key={s.step}
                        class={s.containerClass}
                        role="listitem"
                        aria-current={s.ariaCurrent}
                        data-step={s.step}
                        onclick={handleStepClick}>
                        <div class="pcw-step__marker"></div>
                        <div class="pcw-step__label">{s.label}</div>
                    </div>
                </template>
            </div>
        </div>

        <template if:true={errorMessage}>
            <div class="wizard-error slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error" role="alert">
                <h2>{errorMessage}</h2>
            </div>
        </template>

        <template if:true={isStep1}>
            <c-promo-code-wizard-step-definition
                wizard-data={wizardData}
                available-currencies={availableCurrencies}
                onfieldchange={handleFieldChange}
                onstepvalidate={handleStepValidate}>
            </c-promo-code-wizard-step-definition>
        </template>
        <template if:true={isStep2}>
            <c-promo-code-wizard-step-scope
                wizard-data={wizardData}
                onfieldchange={handleFieldChange}
                onstepvalidate={handleStepValidate}>
            </c-promo-code-wizard-step-scope>
        </template>
        <template if:true={isStep3}>
            <c-promo-code-wizard-step-limits
                wizard-data={wizardData}
                onfieldchange={handleFieldChange}
                onstepvalidate={handleStepValidate}>
            </c-promo-code-wizard-step-limits>
        </template>
        <template if:true={isStep4}>
            <c-promo-code-wizard-step-review
                wizard-data={wizardData}
                onjumpto={handleJumpTo}>
            </c-promo-code-wizard-step-review>
        </template>

        <template if:true={isSubmitting}>
            <lightning-spinner alternative-text={labels.saving} size="medium"></lightning-spinner>
        </template>
    </lightning-modal-body>

    <lightning-modal-footer>
        <lightning-button label={labels.btnCancel} onclick={handleCancel} class="slds-m-right_x-small"></lightning-button>
        <template if:false={isFirstStep}>
            <lightning-button label={labels.btnBack} onclick={handleBack} class="slds-m-right_x-small"></lightning-button>
        </template>
        <template if:true={isReviewStep}>
            <lightning-button
                label={labels.btnSaveAsDraft}
                onclick={handleSaveDraft}
                disabled={isSubmitting}
                class="slds-m-right_x-small">
            </lightning-button>
            <lightning-button
                label={labels.btnActivateNow}
                variant="brand"
                onclick={handleActivateNow}
                disabled={isSubmitting}>
            </lightning-button>
        </template>
        <template if:false={isReviewStep}>
            <lightning-button
                label={labels.btnNext}
                variant="brand"
                onclick={handleNext}
                disabled={nextDisabled}>
            </lightning-button>
        </template>
    </lightning-modal-footer>
</template>
