<template>
    <lightning-card>
        <template if:false={showWizard}>
            <div class="slds-p-around_medium">
                <lightning-button
                    label="New Promo Code"
                    variant="brand"
                    icon-name="utility:add"
                    onclick={handleOpen}>
                </lightning-button>
                <p class="slds-m-top_x-small slds-text-color_weak slds-text-body_small">
                    Launches the Promo Code creation wizard. Records are created in Draft and
                    require activation before members can apply them at checkout.
                </p>
            </div>
        </template>

        <template if:true={showWizard}>
            <div class="slds-p-around_small">
                <c-promo-code-creation-wizard onclose={handleClose}></c-promo-code-creation-wizard>
            </div>
        </template>
    </lightning-card>
</template>
