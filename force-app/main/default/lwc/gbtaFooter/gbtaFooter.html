<template>
    <footer class="gbta-footer" role="contentinfo">

        <!-- Help Button -->
        <div class="gbta-footer__help">
            <button class="gbta-footer__help-btn" onclick={handleHelpClick}>{helpButtonLabel}</button>
        </div>

        <!-- Main Grid: Columns + Social -->
        <div class="gbta-footer__grid">
            <div class="gbta-footer__col">
                <template if:true={column1Title}>
                    <h3 class="gbta-footer__col-heading">{column1Title}</h3>
                </template>
                <ul class="gbta-footer__col-links">
                    <template for:each={column1Items} for:item="item">
                        <li key={item.id}>
                            <a href={item.computedHref} class="gbta-footer__link">{item.label}</a>
                        </li>
                    </template>
                </ul>
            </div>

            <div class="gbta-footer__col">
                <template if:true={column2Title}>
                    <h3 class="gbta-footer__col-heading">{column2Title}</h3>
                </template>
                <ul class="gbta-footer__col-links">
                    <template for:each={column2Items} for:item="item">
                        <li key={item.id}>
                            <a href={item.computedHref} class="gbta-footer__link">{item.label}</a>
                        </li>
                    </template>
                </ul>
            </div>

            <div class="gbta-footer__col">
                <template if:true={column3Title}>
                    <h3 class="gbta-footer__col-heading">{column3Title}</h3>
                </template>
                <ul class="gbta-footer__col-links">
                    <template for:each={column3Items} for:item="item">
                        <li key={item.id}>
                            <a href={item.computedHref} class="gbta-footer__link">{item.label}</a>
                        </li>
                    </template>
                </ul>
            </div>

            <!-- Social icons + language selector -->
            <div class="gbta-footer__right">
                <div class="gbta-footer__social">
                    <template if:true={twitterUrl}>
                        <a href={twitterUrl} class="gbta-footer__social-link" target="_blank"
                           rel="noopener noreferrer" aria-label="Follow GBTA on X (Twitter)">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                 class="gbta-footer__social-icon" aria-hidden="true" fill="currentColor">
                                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                            </svg>
                        </a>
                    </template>
                    <template if:true={facebookUrl}>
                        <a href={facebookUrl} class="gbta-footer__social-link" target="_blank"
                           rel="noopener noreferrer" aria-label="Follow GBTA on Facebook">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                 class="gbta-footer__social-icon" aria-hidden="true" fill="currentColor">
                                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                            </svg>
                        </a>
                    </template>
                    <template if:true={youtubeUrl}>
                        <a href={youtubeUrl} class="gbta-footer__social-link" target="_blank"
                           rel="noopener noreferrer" aria-label="Watch GBTA on YouTube">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                 class="gbta-footer__social-icon" aria-hidden="true" fill="currentColor">
                                <path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                            </svg>
                        </a>
                    </template>
                    <template if:true={instagramUrl}>
                        <a href={instagramUrl} class="gbta-footer__social-link" target="_blank"
                           rel="noopener noreferrer" aria-label="Follow GBTA on Instagram">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                 class="gbta-footer__social-icon" aria-hidden="true" fill="currentColor">
                                <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
                            </svg>
                        </a>
                    </template>
                </div>
                <template if:true={languageLabel}>
                    <button class="gbta-footer__lang-btn" onclick={handleLanguageClick}>
                        <lightning-icon icon-name="utility:world" size="x-small"></lightning-icon>
                        <span>{languageLabel}</span>
                    </button>
                </template>
            </div>
        </div>

        <!-- Bottom Bar -->
        <div class="gbta-footer__bottom">
            <a href={basePath} class="gbta-footer__brand" aria-label={logoAlt}>
                <template if:true={footerLogoUrl}>
                    <img src={footerLogoUrl} alt={logoAlt} class="gbta-footer__brand-img" />
                </template>
                <template if:false={footerLogoUrl}>
                    <span class="gbta-footer__brand-text">GBTA</span>
                </template>
            </a>
            <template if:true={copyrightText}>
                <p class="gbta-footer__copyright">{copyrightText}</p>
            </template>
        </div>

    </footer>
</template>
