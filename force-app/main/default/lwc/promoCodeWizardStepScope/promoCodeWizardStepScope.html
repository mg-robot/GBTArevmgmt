<template>
    <!-- Validity Window -->
    <div class="slds-m-bottom_medium">
        <h3 class="section-heading">{label.validityHeading}</h3>
        <p class="helper-text">{label.validityHelper}</p>
        <lightning-input
            type="datetime"
            label={label.effectiveStart}
            value={wizardData.effectiveStart}
            onchange={handleStartChange}>
        </lightning-input>
        <lightning-input
            type="datetime"
            label={label.effectiveEnd}
            value={wizardData.effectiveEnd}
            class="slds-m-top_small"
            onchange={handleEndChange}>
        </lightning-input>
    </div>

    <!-- Member & Region Scope -->
    <div class="slds-m-bottom_medium">
        <h3 class="section-heading">{label.memberRegionHeading}</h3>
        <p class="helper-text">{label.memberRegionHelper}</p>
        <lightning-checkbox-group
            label={label.memberTypeScope}
            options={memberTypeOptions}
            value={wizardData.memberTypeScope}
            onchange={handleMemberTypeScopeChange}>
        </lightning-checkbox-group>
        <lightning-checkbox-group
            label={label.regionScope}
            options={regionOptions}
            value={wizardData.regionScope}
            class="slds-m-top_small"
            onchange={handleRegionScopeChange}>
        </lightning-checkbox-group>
    </div>

    <!-- Product Applicability -->
    <div class="slds-m-bottom_medium">
        <h3 class="section-heading">{label.productAppHeading}</h3>
        <p class="helper-text">{label.productAppHelper}</p>
        <lightning-radio-group
            label={label.productScope}
            options={productScopeTypeOptions}
            value={wizardData.productScopeType}
            type="radio"
            onchange={handleProductScopeTypeChange}>
        </lightning-radio-group>
        <template if:true={isProductFamily}>
            <lightning-combobox
                label={label.productFamily}
                options={productFamilyOptions}
                value={wizardData.specificProducts}
                class="slds-m-top_small"
                onchange={handleProductFamilyChange}>
            </lightning-combobox>
        </template>
        <template if:true={isSpecificProducts}>
            <div class="slds-m-top_small">
                <c-promo-specific-product-picker
                    initial-csv={wizardData.specificProducts}
                    onchange={handleSpecificProductsChange}>
                </c-promo-specific-product-picker>
            </div>
        </template>
    </div>

    <!-- Account Scope -->
    <div class="slds-m-bottom_medium">
        <h3 class="section-heading">{label.accountScopeHeading}</h3>
        <p class="helper-text">{label.accountScopeHelper}</p>
        <lightning-record-picker
            label={label.account}
            object-api-name="Account"
            value={wizardData.accountId}
            onchange={handleAccountChange}>
        </lightning-record-picker>
    </div>
</template>
