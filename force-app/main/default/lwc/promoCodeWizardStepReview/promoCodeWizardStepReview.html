<template>
    <p class="slds-m-bottom_small">
        About to create <strong>{recordCount}</strong> Promo Code record(s) sharing Code
        <strong>{wizardData.code}</strong>:
    </p>
    <div class="record-list">
        <template for:each={recordPreview} for:item="r">
            <div key={r.label}>{r.label}</div>
        </template>
    </div>

    <!-- Definition summary -->
    <div class="summary-card">
        <div class="summary-section-title">
            <span class="summary-section-name">Definition</span>
            <a href="#" data-step="1" class="summary-section-edit" onclick={handleEditClick}>Edit</a>
        </div>
        <dl class="slds-dl_horizontal slds-text-body_small">
            <dt class="slds-dl_horizontal__label">Code</dt>
            <dd class="slds-dl_horizontal__detail">{wizardData.code}</dd>
            <dt class="slds-dl_horizontal__label">Display Name</dt>
            <dd class="slds-dl_horizontal__detail">{wizardData.displayName}</dd>
            <dt class="slds-dl_horizontal__label">Discount Type</dt>
            <dd class="slds-dl_horizontal__detail">{wizardData.discountType}</dd>
            <dt class="slds-dl_horizontal__label">Discount Value</dt>
            <dd class="slds-dl_horizontal__detail">{discountValueDisplay}</dd>
        </dl>
    </div>

    <!-- Scope summary -->
    <div class="summary-card">
        <div class="summary-section-title">
            <span class="summary-section-name">Scope &amp; Eligibility</span>
            <a href="#" data-step="2" class="summary-section-edit" onclick={handleEditClick}>Edit</a>
        </div>
        <dl class="slds-dl_horizontal slds-text-body_small">
            <dt class="slds-dl_horizontal__label">Effective</dt>
            <dd class="slds-dl_horizontal__detail">{effectiveDisplay}</dd>
            <dt class="slds-dl_horizontal__label">Member Types</dt>
            <dd class="slds-dl_horizontal__detail">{memberTypeDisplay}</dd>
            <dt class="slds-dl_horizontal__label">Regions</dt>
            <dd class="slds-dl_horizontal__detail">{regionDisplay}</dd>
            <dt class="slds-dl_horizontal__label">Products</dt>
            <dd class="slds-dl_horizontal__detail">{productScopeDisplay}</dd>
            <dt class="slds-dl_horizontal__label">Account</dt>
            <dd class="slds-dl_horizontal__detail">{accountDisplay}</dd>
        </dl>
    </div>

    <!-- Limits summary -->
    <div class="summary-card">
        <div class="summary-section-title">
            <span class="summary-section-name">Limits &amp; Behavior</span>
            <a href="#" data-step="3" class="summary-section-edit" onclick={handleEditClick}>Edit</a>
        </div>
        <dl class="slds-dl_horizontal slds-text-body_small">
            <dt class="slds-dl_horizontal__label">Total Limit</dt>
            <dd class="slds-dl_horizontal__detail">{totalLimitDisplay}</dd>
            <dt class="slds-dl_horizontal__label">Per-Member Limit</dt>
            <dd class="slds-dl_horizontal__detail">{perMemberLimitDisplay}</dd>
            <dt class="slds-dl_horizontal__label">Combinable</dt>
            <dd class="slds-dl_horizontal__detail">{combinableDisplay}</dd>
            <dt class="slds-dl_horizontal__label">Approval Required</dt>
            <dd class="slds-dl_horizontal__detail">{approvalDisplay}</dd>
        </dl>
    </div>

    <div class="activation-banner">
        This promo code will not be available for use until it has been activated.
        <strong>Save as Draft</strong> creates the record(s) but no member can redeem until you
        activate them later from the record page. <strong>Activate Now</strong> makes the code(s)
        immediately available.
    </div>
</template>
