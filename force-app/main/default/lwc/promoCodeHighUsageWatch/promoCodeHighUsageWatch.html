<template>
    <article class="tile" onclick={handleOpen} onkeydown={handleKeydown} tabindex="0" role="button" aria-label="Open High Usage list view">
        <header class="tile-header">
            <div class="tile-icon-slot">
                <template if:true={iconUrl}>
                    <img src={iconUrl} alt="" class="tile-icon" onerror={handleIconError} />
                </template>
                <template if:false={iconUrl}>
                    <lightning-icon icon-name="utility:trending" size="small" variant="inverse" class="tile-icon-fallback"></lightning-icon>
                </template>
            </div>
            <h2 class="tile-title">High Usage Promos</h2>
        </header>

        <div class="tile-body">
            <p class="description">
                Currently-usable promo codes that have been redeemed at least once, ranked by total redemptions. Use to spot codes approaching their usage cap.
            </p>
        </div>
    </article>
</template>
