<template>
    <div class="slds-grid slds-grid_align-spread slds-m-bottom_x-small">
        <strong class="slds-text-body_regular">{label.heading}</strong>
        <lightning-button
            label={label.addRow}
            icon-name="utility:add"
            variant="brand"
            class="add-row-button"
            onclick={addRow}>
        </lightning-button>
    </div>

    <template if:true={hasRows}>
        <template for:each={rows} for:item="row" for:index="idx">
            <div key={row.key} class="slds-grid slds-gutters slds-m-bottom_x-small">
                <div class="slds-col slds-size_5-of-12">
                    <lightning-combobox
                        label="Currency"
                        variant="label-hidden"
                        placeholder={label.selectCurrency}
                        value={row.currencyIsoCode}
                        options={row.options}
                        data-idx={idx}
                        onchange={handleCurrencyChange}
                        required>
                    </lightning-combobox>
                </div>
                <div class="slds-col slds-size_5-of-12">
                    <div class="slds-form-element">
                        <div class="slds-form-element__control">
                            <input
                                type="number"
                                step="0.01"
                                min="0.01"
                                class="slds-input"
                                placeholder={label.amountPlaceholder}
                                value={row.amount}
                                data-idx={idx}
                                oninput={handleAmountChange}
                                onchange={handleAmountChange}
                                required />
                        </div>
                    </div>
                </div>
                <div class="slds-col slds-size_2-of-12">
                    <lightning-button-icon
                        icon-name="utility:delete"
                        alternative-text={label.remove}
                        title={label.remove}
                        data-idx={idx}
                        onclick={removeRow}>
                    </lightning-button-icon>
                </div>
            </div>
        </template>
    </template>

    <template if:false={hasRows}>
        <p class="slds-text-color_weak slds-text-body_small">{label.noRows}</p>
    </template>
</template>
