<template>
  <div class="entry">
    <header class="entry-header">
      <h3 class="entry-title">{label.title}</h3>
      <template if:false={showInput}>
        <lightning-button
          label={label.addBtn}
          icon-name="utility:add"
          variant="brand-outline"
          onclick={handleShowInput}
          disabled={controlsDisabled}
        >
        </lightning-button>
      </template>
    </header>

    <template if:true={showInput}>
      <div class="input-row">
        <lightning-input
          type="text"
          label={label.codeFieldLabel}
          variant="label-hidden"
          placeholder={label.codePlaceholder}
          value={inputValue}
          onchange={handleInputChange}
          onkeydown={handleInputKeydown}
          disabled={controlsDisabled}
          class="code-input"
        >
        </lightning-input>
        <lightning-button
          label={label.applyBtn}
          variant="brand"
          onclick={handleApply}
          disabled={applyDisabled}
        >
        </lightning-button>
        <lightning-button
          label={label.cancelBtn}
          variant="neutral"
          onclick={handleCancelInput}
          disabled={controlsDisabled}
        >
        </lightning-button>
      </div>
    </template>

    <template if:true={isLoading}>
      <div class="state-row">
        <lightning-spinner
          size="small"
          alternative-text={label.working}
        ></lightning-spinner>
      </div>
    </template>

    <template if:true={hasAppliedCodes}>
      <ul class="codes-list" role="list">
        <template for:each={appliedCodes} for:item="c">
          <li key={c.code} class="code-row code-row--applied">
            <div class="code-row-main">
              <div class="code-info">
                <span class="code-value">{c.code}</span>
                <template if:true={c.displayName}>
                  <span class="code-name">{c.displayName}</span>
                </template>
              </div>
              <div class="code-amount">
                <lightning-formatted-number
                  value={c.appliedAmount}
                  format-style="currency"
                  currency-code={c.currencyIsoCode}
                >
                </lightning-formatted-number>
              </div>
              <lightning-button-icon
                icon-name="utility:close"
                alternative-text={label.removeCode}
                title={label.removeCode}
                data-code={c.code}
                onclick={handleRemove}
                disabled={controlsDisabled}
                size="small"
              >
              </lightning-button-icon>
            </div>
          </li>
        </template>
      </ul>
    </template>

    <template if:true={hasFailedCodes}>
      <ul class="codes-list" role="list">
        <template for:each={failedCodes} for:item="c">
          <li key={c.code} class="code-row code-row--failed">
            <div class="code-row-main">
              <div class="code-info">
                <span class="code-value">{c.code}</span>
              </div>
              <lightning-button-icon
                icon-name="utility:close"
                alternative-text={label.dismissFailed}
                title={label.dismiss}
                data-code={c.code}
                onclick={handleDismissFailed}
                disabled={controlsDisabled}
                size="small"
              >
              </lightning-button-icon>
            </div>
            <div class="error-banner">{c.errorMessage}</div>
          </li>
        </template>
      </ul>
    </template>

    <template if:true={hasDroppedCodes}>
      <ul class="codes-list" role="list">
        <template for:each={droppedCodes} for:item="c">
          <li key={c.code} class="code-row code-row--dropped">
            <div class="code-row-main">
              <div class="code-info">
                <span class="code-value">{c.code}</span>
              </div>
              <lightning-button-icon
                icon-name="utility:close"
                alternative-text={label.dismissNotice}
                title={label.dismiss}
                data-code={c.code}
                onclick={handleDismissDropped}
                disabled={controlsDisabled}
                size="small"
              >
              </lightning-button-icon>
            </div>
            <div class="notice-banner">{c.errorMessage}</div>
          </li>
        </template>
      </ul>
    </template>

    <template if:true={hasAppliedCodes}>
      <div class="savings-summary">
        <span class="savings-label">{label.totalSavings}</span>
        <lightning-formatted-number
          value={totalAdjustment}
          format-style="currency"
          currency-code={summaryCurrency}
          class="savings-amount"
        >
        </lightning-formatted-number>
      </div>
    </template>
  </div>
</template>
