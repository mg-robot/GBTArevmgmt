<template>
    <!-- Identity -->
    <div class="slds-m-bottom_medium">
        <h3 class="section-heading">{label.identityHeading}</h3>
        <p class="helper-text">{label.identityHelper}</p>
        <lightning-input
            label={label.codeLabel}
            value={wizardData.code}
            maxlength="50"
            pattern="[A-Z0-9]+"
            message-when-pattern-mismatch={label.codePatternError}
            required
            onchange={handleCodeChange}>
        </lightning-input>
        <template if:true={hasCodeConflicts}>
            <p class="slds-text-color_weak slds-text-body_small slds-m-top_xx-small">
                {label.codeConflictPrefix} {codeConflictsLabel}{label.codeConflictSuffix}
            </p>
        </template>
        <lightning-input
            label={label.displayName}
            value={wizardData.displayName}
            maxlength="80"
            required
            class="slds-m-top_small"
            onchange={handleDisplayNameChange}>
        </lightning-input>
        <div class="slds-m-top_small">
            <label class="slds-form-element__label">{label.terms}</label>
            <p class="helper-text">{label.termsHelper}</p>
            <lightning-input-rich-text
                value={wizardData.terms}
                onchange={handleTermsChange}>
            </lightning-input-rich-text>
        </div>
    </div>

    <!-- Discount Details -->
    <div class="slds-m-bottom_medium">
        <h3 class="section-heading">{label.discDetailsHeading}</h3>
        <span class="field-label">{label.discTypeLabel}<span class="required-asterisk">*</span></span>
        <lightning-radio-group
            label={label.discTypeLabel}
            variant="label-hidden"
            options={discountTypeOptions}
            value={wizardData.discountType}
            type="radio"
            required
            onchange={handleDiscountTypeChange}>
        </lightning-radio-group>
    </div>

    <!-- Discount Value -->
    <template if:true={hasType}>
        <div class="slds-m-bottom_medium">
            <h3 class="section-heading">{label.discValueHeading}</h3>
            <template if:true={isPercent}>
                <p class="helper-text">{label.discValuePercentHelper}</p>
                <lightning-input
                    type="number"
                    label={label.percentOff}
                    min="0.01"
                    max="100"
                    step="0.01"
                    value={wizardData.percentValue}
                    required
                    onchange={handlePercentValueChange}>
                </lightning-input>
                <lightning-checkbox-group
                    label={label.currencies}
                    options={currencyOptions}
                    value={wizardData.percentCurrencies}
                    class="slds-m-top_small"
                    onchange={handlePercentCurrenciesChange}>
                </lightning-checkbox-group>
            </template>
            <template if:true={isAmount}>
                <p class="helper-text">{label.discValueAmountHelper}</p>
                <c-promo-currency-amount-input
                    available-currencies={availableCurrencies}
                    initial-amounts={wizardData.amounts}
                    onchange={handleAmountsChange}>
                </c-promo-currency-amount-input>
            </template>
        </div>
    </template>
</template>
